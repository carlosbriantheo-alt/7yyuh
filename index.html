<html> 
<head>
<title>Formulir Pendaftaran Siswa</title>
<link rel="stylesheet" href="sumatif2 Nobel.css">
</head>
<body>

<div class="container">
	<p>Isi data dengan teliti,semua informasi akan digunakanuntuk keperluan administrasi.</p>
	<label> Nama lengkap* </label>
	<input type="text" id="name" placeholder="Cth:Siti Aisyah">
	<label> Kelas/Tingkatan* </label>
	<input type="text" id="Kelas" placeholder="Contoh:XII IPA 3/ 8A/ 3SD">
	<label> Jenis kelamin</label>
	<label>
		<input type="radio" name="|  Jenis kelamin" value= "pria">pria
	</label>
	<label>
		<input type="radio" name="|  Jenis kelamin" value= "wanita">wanita
	</label>
	<label>
		<input type="radio" name="|  Jenis kelamin" value= "lainnya">lainnya
	
	<label> |Ekstrakurikuler yang diminati </label>
	<label>
		<input type="checkbox" name="|Ekstrakurikuler yang diminati" value= "Basket">Basket
	</label>
	<label>
		<input type="checkbox" name="|Ekstrakurikuler yang diminati" value= "Futsal">Futsal
	</label>
	<label>
		<input type="checkbox" name="|Ekstrakurikuler yang diminati" value= "Paduan Suara">Paduan Suara
	</label>
		<label> | Pilih Jadwal Belajar*wajib </label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar*wajib" value= "Pagi(07.00-12.00)">Pagi(07.00-12.00)
	</label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar*wajib" value= "Siang(12.30-17.00)">Siang(12.30-17.00)
	</label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar*wajib" value= "Sore(17.30-20.30)">Sore(17.30-20.30)
	</label>
	<label>
		<input type="radio" name="| Pilih Jadwal Belajar*wajib" value= "Campuran(fleksibel)">Campuran(fleksibel)
	</label>
	<div class="grid-container">
  <button>Daftar sekarang</button>
  <button>Reset formulir</button>
</div>
<div class="result" id="hasil">
Hasil anda disini
</div>
<script src="sumatif2 Nobel.js"></script>
</body>
</html>
